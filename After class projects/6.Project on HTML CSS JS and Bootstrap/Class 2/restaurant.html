<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        body {
            background: #111;
            color: #fff;
            padding: 60px 8%;
        }
        h2 {
            text-align: center;
            font-size: 40px;
            margin-bottom: 50px;
            color: #D4AF37;
        }
        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }
        .card {
            background: #1e1e1e;
            border-radius: 12px;
            overflow: hidden;
            transition: 0.4s;
        }
        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }
        .card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }
        .card-content {
            padding: 20px;
        }
        .card-content h3 {
            margin-bottom: 10px;
            color: #D4AF37;
        }
        .card-content p {
            color: #ccc;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <section class="portfolio">
        <h2>Our Portfolio</h2>
        <div class="portfolio-grid">
            <div class="card">
                <img src="https://images.unsplash.com/photo-1544025162-d76694265947?q=80&w=1200&auto=format&fit=crop"
                    alt="">
                <div class="card-content">
                    <h3>Grilled Steak</h3>
                    <p>
                        Premium steak cooked perfectly with special restaurant spices.
                    </p>
                </div>
            </div>
            <div class="card">
                <img src="https://images.unsplash.com/photo-1621996346565-e3dbc646d9a9?q=80&w=1200&auto=format&fit=crop"
                    alt="">
                <div class="card-content">
                    <h3>Italian Pasta</h3>
                    <p>
                        Delicious creamy pasta made with fresh ingredients and herbs.
                    </p>
                </div>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?q=80&w=1200&auto=format&fit=crop"
                    alt="">
                <div class="card-content">
                    <h3>Seafood Special</h3>
                    <p>
                        Fresh seafood dishes served with elegant presentation.
                    </p>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
