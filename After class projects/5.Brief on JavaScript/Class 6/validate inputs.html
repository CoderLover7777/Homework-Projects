<html>
    <head>
        <title>
            Validation using API
        </title>
    </head>
    <body>
        <p>
            Enter your age and click OK:
        </p>
        <input id="idi" type="number" min="18" required>
        <button onclick="myFunction()">
            OK
        </button>
        <p id="result"></p>
        <script>
            function myFunction() {
                var impObj = document.getElementById("idi");
                    if (!impObj.checkValidity()) {
                    document.getElementById("result").innerHTML = impObj.validationMessage;
                } else {
                    document.getElementById("result").innerHTML = "Input OK";
                }
            }
        </script>
    </body>
</html>
