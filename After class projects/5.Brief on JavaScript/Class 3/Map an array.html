<html>
    <head>
        <title>Array Map and Sort</title>
    </head>
    <body>
        <button onclick="sortAsc()">Ascending</button>
        <button onclick="sortDesc()">Descending</button>
        <p id="output"></p>
        <script>
            const numbers = [2, 5, 1, 4, 3];
            const mapped = numbers.map(n => n * 2);
            function display(arr) {
                document.getElementById("output").innerHTML = arr.join(", ");
            }
            function sortAsc() {
                const asc = [...mapped].sort((a, b) => a - b);
                display(asc);
            }
            function sortDesc() {
                const desc = [...mapped].sort((a, b) => b - a);
                display(desc);
            }
            display(mapped);
        </script>
    </body>
</html>
